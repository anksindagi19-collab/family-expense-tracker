<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/auth.css') }}">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>💰 Family Expense Tracker</h1>

        <h2>Create Account</h2>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Full Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Register
            </button>

        </form>

        <p>

            Already have an account?

            <a href="/login">Login</a>

        </p>

    </div>

</div>

</body>

</html>
