<!DOCTYPE html>
<html>

<head>

    <title>Add Expense</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/forms.css') }}">

</head>

<body>

<div class="form-container">

    <h1>💸 Add Expense</h1>

    <form method="POST">

        <input
            type="text"
            name="title"
            placeholder="Expense Title"
            required>

        <input
            type="number"
            step="0.01"
            name="amount"
            placeholder="Amount"
            required>

        <input
            type="text"
            name="category"
            placeholder="Category"
            required>

        <button type="submit">
            Save Expense
        </button>

    </form>

    <br>

    <a href="/dashboard">
        ← Back to Dashboard
    </a>

</div>

</body>

</html>
