<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/auth.css') }}">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>💰 Family Expense Tracker</h1>

        <h2>Login</h2>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?
            <a href="/register">Register</a>
        </p>

    </div>

</div>

</body>

</html>
